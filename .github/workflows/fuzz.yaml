# Scheduled decoder fuzzing — the 30-minute clean-run gate from
# IMPLEMENTATION-PLAN M0 acceptance (bead m7g). Runs nightly and on demand;
# 30 minutes of libFuzzer wall time, any crash fails the job and uploads the
# reproducing artifact.
name: fuzz

on:
  schedule:
    - cron: "17 4 * * *" # daily, 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  decode_record:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: guest-sdk/fuzz }
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with: { tool: cargo-fuzz }
      - name: Fuzz decode_record for 30 minutes
        working-directory: guest-sdk
        # The gate is "30 minutes clean": a crash exits nonzero (libFuzzer),
        # and a suspiciously-early clean exit fails too — it means the run
        # did not actually fuzz for the mandated window.
        # --target is explicit: the prebuilt cargo-fuzz binary is
        # musl-linked and would otherwise default to the musl target, which
        # has no std for the sanitizer build (found on the first dispatch).
        run: |
          start=$(date +%s)
          cargo +nightly fuzz run decode_record \
            --target x86_64-unknown-linux-gnu -- -max_total_time=1800
          elapsed=$(( $(date +%s) - start ))
          if [ "$elapsed" -lt 1700 ]; then
            echo "fuzz exited clean after only ${elapsed}s — gate requires ~1800s"
            exit 1
          fi
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: decode_record-crashes
          path: guest-sdk/fuzz/artifacts/decode_record/
          if-no-files-found: ignore
