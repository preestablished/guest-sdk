# CI tiering per IMPLEMENTATION-PLAN: wire+host tests run everywhere
# (including aarch64); the in-VM tier is gated to the Intel self-hosted
# runner. Every job needs the sibling control-plane checkout — the workspace
# carries a `determinism-proto = { path = "../control-plane/..." }` path dep
# (consumed only by m0-proto-client; both repos are public).
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One run per ref; superseded PR runs cancel (protects the single
# self-hosted runner from queue pileup).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: guest-sdk

jobs:
  # Hosted lane: fmt, clippy -D warnings, full workspace tests. This covers
  # the std SDK crate on normal hosted x86_64 without enabling KVM gates.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: guest-sdk }
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # M0 acceptance: the wire crate builds and tests without std (bead lcv).
  # detguest-sdk is intentionally std-only because it maps fds, /dev/mem, and
  # uses process-level detcall privileges.
  no_std:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: guest-sdk }
      - run: cargo test -p detguest-wire --no-default-features

  # Miri over the ring module — the raw-pointer/index logic UB check
  # (bead 51r; IMPLEMENTATION-PLAN risk table).
  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: dtolnay/rust-toolchain@nightly
        with: { components: miri }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: guest-sdk }
      - run: cargo miri test -p detguest-wire --lib ring

  # Loom interleavings of the SPSC producer/consumer protocol (bead wq8).
  loom:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: --cfg loom
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: guest-sdk }
      - run: cargo test -p detguest-wire --test loom_ring --release

  # Static musl cross-build of the agent + SDK-linked workloads, with a
  # --check smoke run of the produced binary (bead ssl).
  musl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-unknown-linux-musl }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: guest-sdk }
      - run: >
          cargo build --release --target x86_64-unknown-linux-musl
          -p detguest-agent -p detguest-sdk -p detguest-workloads
      - run: ./target/x86_64-unknown-linux-musl/release/detguest-agent --check
      - run: >
          file target/x86_64-unknown-linux-musl/release/detguest-agent
          | grep -E 'static(ally|-pie) linked'

  # aarch64 lane: wire + host + SDK hosted tests only — these crates compile
  # without KVM, and the SDK detcall ABI is cfg-gated so non-x86 builds fail
  # only at runtime init, not at compile time. Public-repo arm64 hosted runner.
  aarch64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: guest-sdk }
      - run: cargo test -p detguest-wire -p detguest-host -p detguest-sdk

  # In-VM tier: Intel box only (beads rci + atd). Preflight is the phase
  # entry gate — pinned kernel, perf_event access, KVM caps — then the
  # KVM-gated tests run with both gates open.
  in_vm:
    # SECURITY: public repo + self-hosted runner — this job must NEVER run
    # fork-PR code. push (post-merge to main) only; hosted lanes carry the
    # full pre-merge signal. (GitHub's first-time-contributor approval does
    # not gate returning contributors.)
    if: github.event_name == 'push'
    runs-on: [self-hosted, intel, kvm]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { path: guest-sdk }
      - uses: actions/checkout@v4
        with: { repository: preestablished/control-plane, path: control-plane }
      - uses: actions/checkout@v4
        with:
          repository: preestablished/reference-workload
          ref: 7b0c7b2434e71d8b3241bf78597be457b281292d
          path: reference-workload
      # The runner service env does not source the user profile; rustup's
      # bin dir must be added explicitly or the preflight cargo gate fails.
      - name: Configure runner paths
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "DETGUEST_EVIDENCE_DIR=$RUNNER_TEMP/guest-sdk-evidence/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
      - name: Prepare evidence and pinned real image
        run: |
          set -euo pipefail
          mkdir -p "$DETGUEST_EVIDENCE_DIR"
          printf 'run=%s attempt=%s sha=%s runner=%s\n' \
            "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$GITHUB_SHA" "$RUNNER_NAME" \
            > "$DETGUEST_EVIDENCE_DIR/environment.txt"
          test "$(git -C ../reference-workload rev-parse HEAD)" = \
            7b0c7b2434e71d8b3241bf78597be457b281292d
          dist=/home/infra-admin/git/preestablished/reference-workload/dist/workload-image-0.1.0
          test -f "$dist/initramfs.cpio.zst"
          test -f "$dist/bzImage"
          grep -F 'reference_workload_git_rev: "7b0c7b2434e71d8b3241bf78597be457b281292d"' \
            "$dist/determinism.last_green"
          test "$(b3sum "$dist/workload-image.yaml" | cut -d' ' -f1)" = \
            af14040444db6f5e182f52193d71abdbbfb8085673b45da76c21dc541ac3dceb
          test "$(b3sum "$dist/initramfs.cpio.zst" | cut -d' ' -f1)" = \
            67f1ed56769cd3f05b294c18068fb0c75d547da03ec2d6bc34bc127dd04c019b
          test "$(b3sum "$dist/bzImage" | cut -d' ' -f1)" = \
            595466463a37efac6822ffccf3e61d0a2230e7d223a94c0bce5eb78b2f43bee9
          zstd -d -f "$dist/initramfs.cpio.zst" \
            -o "$DETGUEST_EVIDENCE_DIR/refwork-initramfs.cpio"
          kernel_cache=/home/infra-admin/git/preestablished/guest-sdk/image/build
          test "$(b3sum "$kernel_cache/bzImage" | cut -d' ' -f1)" = \
            595466463a37efac6822ffccf3e61d0a2230e7d223a94c0bce5eb78b2f43bee9
          test "$(b3sum "$kernel_cache/kernel.final.config" | cut -d' ' -f1)" = \
            07d7606f39e8f6faafc252737d51a7e67f75edbc1ab032f80a971babe06340fa
          test "$(b3sum "$kernel_cache/kernel.provenance" | cut -d' ' -f1)" = \
            d747b9e252504df3fd0d9eb97d6a9adab1e6bab1b5e2d33e79dc9b0f04819b0e
          mkdir -p image/build
          cp -f "$kernel_cache/bzImage" image/build/bzImage
          cp -f "$kernel_cache/kernel.final.config" image/build/kernel.final.config
          cp -f "$kernel_cache/kernel.provenance" image/build/kernel.provenance
      - name: Intel preflight
        run: |
          set -o pipefail
          timeout 3m ./scripts/intel-preflight.sh 2>&1 | tee "$DETGUEST_EVIDENCE_DIR/preflight.log"
      - name: Ms3 real-workload lifecycle
        env:
          DETGUEST_VM_TESTS: "1"
          REFWORK_READY_INITRAMFS: ${{ runner.temp }}/guest-sdk-evidence/${{ github.run_id }}-${{ github.run_attempt }}/refwork-initramfs.cpio
          REFWORK_READY_BZIMAGE: /home/infra-admin/git/preestablished/reference-workload/dist/workload-image-0.1.0/bzImage
        run: |
          set -o pipefail
          timeout 5m cargo test -p detguest-vmtest --test refwork_ready_hold \
            real_harness_reaches_and_holds_ready -- --exact --nocapture --test-threads=1 \
            2>&1 | tee "$DETGUEST_EVIDENCE_DIR/m3-real-workload.log"
          timeout 5m cargo test -p detguest-vmtest --test m2_acceptance \
            testload_m3_event_stream_hash_matches_golden \
            -- --ignored --exact --nocapture --test-threads=1 \
            2>&1 | tee "$DETGUEST_EVIDENCE_DIR/m3-golden-events.log"
      - name: Ms3 decoded PAD_SET path
        run: |
          set -o pipefail
          timeout 5m env DETGUEST_VM_TESTS=1 cargo test -p detguest-vmtest \
            --test m4_snapshot decoded_pad_sets_land_at_frame_and_match_once_per_frame_polls \
            -- --ignored --exact --nocapture --test-threads=1 \
            2>&1 | tee "$DETGUEST_EVIDENCE_DIR/m3-pad-set.log"
      - name: Ms4 snapshot and readability gates
        run: |
          set -o pipefail
          timeout 18m env DETGUEST_VM_TESTS=1 cargo test -p detguest-vmtest \
            --test m4_acceptance -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee "$DETGUEST_EVIDENCE_DIR/m4-acceptance.log"
      - name: Ms5 inject and reattach gates
        run: |
          set -o pipefail
          timeout 8m env DETGUEST_VM_TESTS=1 cargo test -p detguest-vmtest \
            --test m5_inject_roundtrip -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee "$DETGUEST_EVIDENCE_DIR/m5-inject.log"
          timeout 5m env DETGUEST_VM_TESTS=1 cargo test -p detguest-vmtest \
            --test m4_snapshot restored_branches_continue_channel_sequences_without_duplicates \
            -- --ignored --exact --nocapture --test-threads=1 \
            2>&1 | tee "$DETGUEST_EVIDENCE_DIR/m5-reattach.log"
      - name: Ms5 recurring replay sample (10 iterations)
        env:
          DETGUEST_VM_TESTS: "1"
          DETGUEST_REPLAY_START_ITER: "0"
          DETGUEST_REPLAY_ITER_COUNT: "10"
          DETGUEST_REPLAY_TOTAL_COUNT: "10"
          DETGUEST_REPLAY_SEED_BASE: "0"
          DETGUEST_REPLAY_EVIDENCE_DIR: ${{ runner.temp }}/guest-sdk-evidence/${{ github.run_id }}-${{ github.run_attempt }}/replay
          DETGUEST_REPLAY_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
          DETGUEST_REPLAY_RUNNER_ID: ${{ runner.name }}
          DETGUEST_REPLAY_WORKER_SHA: f855dfb9800e969e8371016112aace7703ee402d
          DETGUEST_REPLAY_WORKLOAD_SHA: 7b0c7b2434e71d8b3241bf78597be457b281292d
          DETGUEST_REPLAY_IMAGE_DIGEST: af14040444db6f5e182f52193d71abdbbfb8085673b45da76c21dc541ac3dceb
          DETGUEST_REPLAY_VERIFY_REF: determinism-hypervisor/docs/phase-2-exit-gate.md:190-192@f855dfb9800e969e8371016112aace7703ee402d
        run: |
          set -o pipefail
          mkdir -p "$DETGUEST_REPLAY_EVIDENCE_DIR"
          timeout 8m cargo test -p detguest-vmtest --test determinism_replay \
            determinism_replay_seeded_iterations_are_bit_identical \
            -- --ignored --exact --nocapture --test-threads=1 \
            2>&1 | tee "$DETGUEST_EVIDENCE_DIR/../m5-replay.log"
      - name: Upload Intel evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: intel-vm-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/guest-sdk-evidence/${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 30
